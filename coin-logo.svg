<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0D264;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8941F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8DC;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#F0D264;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0.2" />
    </linearGradient>
    <filter id="coinShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.3"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer coin edge -->
  <circle cx="32" cy="32" r="30" fill="url(#goldGradient)" stroke="#B8941F" stroke-width="1" filter="url(#coinShadow)"/>
  
  <!-- Inner circle detail -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#F0D264" stroke-width="0.5" opacity="0.6"/>
  
  <!-- Center design - Bold A monogram -->
  <text x="32" y="42" font-family="Arial, sans-serif" font-size="28" font-weight="900" text-anchor="middle" fill="url(#goldShine)" stroke="#B8941F" stroke-width="0.5">A</text>
  
  <!-- Top highlight -->
  <ellipse cx="32" cy="20" rx="18" ry="12" fill="url(#goldShine)" opacity="0.4"/>
  
  <!-- Bottom shadow -->
  <ellipse cx="32" cy="44" rx="18" ry="8" fill="#000000" opacity="0.2"/>
  
  <!-- Edge ridges for realism -->
  <circle cx="32" cy="32" r="29.5" fill="none" stroke="#D4AF37" stroke-width="0.3" stroke-dasharray="1 0.5" opacity="0.5"/>
  <circle cx="32" cy="32" r="28.5" fill="none" stroke="#F0D264" stroke-width="0.2" opacity="0.4"/>
</svg>
